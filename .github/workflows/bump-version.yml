name: Bump version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semantic version component to increment
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: version-bump-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump-version:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out main with tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project
        run: python -m pip install -e .

      - name: Run tests
        env:
          PYTHONPYCACHEPREFIX: /tmp/research-harness-pycache
        run: python -m unittest discover -s tests

      - name: Bump version
        id: version
        env:
          BUMP_PART: ${{ inputs.bump }}
        run: |
          version="$(python scripts/bump_version.py "$BUMP_PART")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add setup.cfg research_harness/__init__.py
          git commit -m "chore: bump version to $VERSION"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin HEAD:main
          git push origin "v$VERSION"

      - name: Summary
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUMP_PART: ${{ inputs.bump }}
        run: |
          echo "### Version bumped to v$VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "Component: $BUMP_PART" >> "$GITHUB_STEP_SUMMARY"
